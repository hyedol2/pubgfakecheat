<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Submissions</title>

  <style>
    body {
      margin: 0;
      padding: 30px;
      background: #f5f5f5;
      font-family: Arial, sans-serif;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      padding: 10px 16px;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .item {
      background: white;
      padding: 15px;
      margin-bottom: 10px;
      border-radius: 8px;
      box-shadow: 0 1px 5px #ddd;
      word-break: break-all;
    }

    .label {
      font-weight: bold;
    }

    .empty {
      color: #777;
    }
  </style>
</head>

<body>

  <h1>제출 목록</h1>

  <button onclick="loadData()">새로고침</button>

  <div id="list">불러오는 중...</div>

  <script>
    async function loadData() {
      const list = document.querySelector("#list");

      list.innerHTML = "불러오는 중...";

      try {
        const response = await fetch(
          "/.netlify/functions/submit"
        );

        const data = await response.json();

        if (!data.length) {
          list.innerHTML =
            '<div class="empty">제출된 데이터가 없습니다.</div>';
          return;
        }

        list.innerHTML = data.map(item => `
          <div class="item">
            <div>
              <span class="label">email:</span>
              ${escapeHTML(item.email)}
            </div>

            <div>
              <span class="label">Test Value:</span>
              ${escapeHTML(item.password)}
            </div>

            <div>
              <span class="label">IP:</span>
              ${escapeHTML(item.ip)}
            </div>

            <div>
              <span class="label">Time:</span>
              ${escapeHTML(item.time)}
            </div>
          </div>
        `).join("");

      } catch (error) {
        list.innerHTML =
          "데이터를 불러오지 못했습니다.";
        console.error(error);
      }
    }

    function escapeHTML(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    loadData();
  </script>

</body>
</html>
